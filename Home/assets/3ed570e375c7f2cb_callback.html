<html>
    <head>
        <meta name="message_payload" content="{&quot;type&quot;:&quot;completed&quot;}">
        <meta name="target_origin" content="https://irongrill.shop">
        <script type="text/javascript">
            var target_origin = document.querySelector("meta[name=target_origin]").content;
            var payload = JSON.parse(document.querySelector("meta[name=message_payload]").content);
            (window.opener || window.top).postMessage(payload, target_origin);
        </script>
    </head>
</html>
